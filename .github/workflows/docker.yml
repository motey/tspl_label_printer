name: docker

# Builds and pushes the Docker image on a GitHub Release.
#   - every release  -> :<version>  (e.g. :0.1.0)
#   - normal release -> :latest
#   - pre-release    -> :beta
#
# Required repository secrets:
#   DOCKERHUB_USERNAME  Docker Hub login (needs push access to motey/labeljetty)
#   DOCKERHUB_TOKEN     Docker Hub access token (Account Settings -> Security)
on:
  release:
    types: [published]

jobs:
  docker:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Compute version and tags
        id: meta
        env:
          TAG_NAME: ${{ github.event.release.tag_name }}
          PRERELEASE: ${{ github.event.release.prerelease }}
          IMAGE: motey/labeljetty
        run: |
          VERSION="${TAG_NAME#v}"
          TAGS="${IMAGE}:${VERSION}"
          if [ "${PRERELEASE}" = "true" ]; then
            TAGS="${TAGS},${IMAGE}:beta"
            # Pre-release/beta keeps verbose logging for diagnosing.
            LOG_LEVEL="DEBUG"
          else
            TAGS="${TAGS},${IMAGE}:latest"
            # Production releases ship without debug logging.
            LOG_LEVEL="INFO"
          fi
          echo "version=${VERSION}" >> "$GITHUB_OUTPUT"
          echo "tags=${TAGS}" >> "$GITHUB_OUTPUT"
          echo "log_level=${LOG_LEVEL}" >> "$GITHUB_OUTPUT"

      - uses: docker/setup-qemu-action@v4
      - uses: docker/setup-buildx-action@v4

      - name: Log in to Docker Hub
        uses: docker/login-action@v4
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build and push
        uses: docker/build-push-action@v7
        with:
          context: .
          push: true
          platforms: linux/amd64,linux/arm64
          build-args: |
            VERSION=${{ steps.meta.outputs.version }}
            LOG_LEVEL=${{ steps.meta.outputs.log_level }}
          tags: ${{ steps.meta.outputs.tags }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      # Push the slim Docker Hub overview/README (links back to GitHub for full docs).
      # Cosmetic — the image is already pushed above, so never fail a release on it.
      # Needs DOCKERHUB_TOKEN to be a Read/Write/Delete-scoped PAT (the description
      # API rejects narrower tokens with 403); image push works with any read/write.
      - name: Update Docker Hub description
        continue-on-error: true
        uses: peter-evans/dockerhub-description@v5
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}
          repository: motey/labeljetty
          short-description: "Network-accessible printing for USB TSPL thermal label printers (web UI + REST API)."
          readme-filepath: ./docs/README.docker.md
